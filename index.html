<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>이미지 표 분석 v2.0</title>
    <style>
        :root { --primary: #4A90E2; --bg: #f4f7f6; }
        body { font-family: -apple-system, sans-serif; padding: 20px; background: var(--bg); }
        .card { background: white; padding: 24px; border-radius: 16px; box-shadow: 0 4px 20px rgba(0,0,0,0.08); max-width: 800px; margin: 0 auto; }
        button { background: var(--primary); color: white; border: none; padding: 14px; border-radius: 8px; cursor: pointer; width: 100%; font-weight: bold; }
        button:disabled { background: #ccc; }
        #tableContainer { width: 100%; overflow-x: auto; margin-top: 25px; border: 1px solid #eee; border-radius: 8px; }
        table { width: 100%; border-collapse: collapse; background: white; }
        th, td { border: 1px solid #ddd; padding: 10px; text-align: left; }
    </style>
</head>
<body>

<div class="card">
    <h2>📊 이미지 표 분석 변환기 (v2.0)</h2>
    <input type="file" id="imageInput" accept="image/*" style="margin:20px 0; width:100%;">
    <button id="convertBtn" onclick="runAnalysis()">AI 분석 시작</button>
    <div id="status" style="margin-top:15px; text-align:center; font-weight:bold;"></div>
    <div id="tableContainer"></div>
</div>

<script>
    async function runAnalysis() {
        const fileInput = document.getElementById('imageInput');
        const status = document.getElementById('status');
        const container = document.getElementById('tableContainer');
        const btn = document.getElementById('convertBtn');

        if (!fileInput.files[0]) return alert("이미지 파일을 선택하세요.");

        // 💡 [중요] API 키를 정확히 확인해 주세요.
        const API_KEY = "AIzaSyCq2FeS2HfHFOSsHCmXPAzkDmLebb_ZOO0";
        
        // v1beta 대신 가장 표준인 v1 경로를 사용하여 모델을 호출합니다.
        const API_URL = `https://generativelanguage.googleapis.com/v1/models/gemini-1.5-flash:generateContent?key=${API_KEY}`;

        btn.disabled = true;
        status.style.color = "#333";
        status.innerText = "⌛ AI 분석 중... (최대 1분)";
        container.innerHTML = "";

        try {
            const file = fileInput.files[0];
            const base64Data = await new Promise((resolve) => {
                const reader = new FileReader();
                reader.onload = () => resolve(reader.result.split(',')[1]);
                reader.readAsDataURL(file);
            });

            const payload = {
                contents: [{
                    parts: [{
                        text: "이 이미지의 표를 추출해서 HTML <table> 태그로만 응답해줘. 추가 설명은 생략해."
                    }, {
                        inlineData: {
                            mimeType: file.type,
                            data: base64Data
                        }
                    }]
                }]
            };

            const response = await fetch(API_URL, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify(payload)
            });

            const result = await response.json();

            if (!response.ok) {
                throw new Error(result.error ? result.error.message : "서버 연결 실패");
            }

            if (result.candidates && result.candidates[0].content) {
                const aiText = result.candidates[0].content.parts[0].text;
                container.innerHTML = aiText.replace(/```html|```/g, "").trim();
                status.style.color = "green";
                status.innerText = "✅ 변환 성공!";
            } else {
                throw new Error("AI가 표를 인식하지 못했습니다.");
            }

        } catch (error) {
            console.error("에러 원인:", error);
            status.style.color = "red";
            status.innerText = "❌ 실패: " + error.message;
            alert("시스템 메시지: " + error.message);
        } finally {
            btn.disabled = false;
        }
    }
</script>

</body>
</html>
