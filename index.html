<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>이미지 표 분석 변환기</title>
    <style>
        :root { --primary-color: #4A90E2; --success-color: #34c759; }
        body { font-family: -apple-system, sans-serif; padding: 20px; background: #f0f2f5; color: #333; line-height: 1.6; }
        .card { background: white; padding: 24px; border-radius: 16px; box-shadow: 0 4px 6px rgba(0,0,0,0.05); max-width: 900px; margin: 0 auto 20px; }
        h2 { margin-top: 0; color: #1a1a1a; }
        input[type="file"] { margin: 15px 0; display: block; width: 100%; }
        button { background: var(--primary-color); color: white; border: none; padding: 12px 24px; border-radius: 8px; cursor: pointer; font-weight: 600; }
        button:disabled { background: #ccc; cursor: not-allowed; }
        .loading { display: none; margin-top: 15px; color: var(--primary-color); font-weight: bold; text-align: center; }
        #tableContainer { width: 100%; overflow-x: auto; margin-top: 20px; border-radius: 8px; }
        table { width: 100%; border-collapse: collapse; background: white; border: 1px solid #ddd; }
        th, td { border: 1px solid #ddd; padding: 10px; text-align: left; font-size: 14px; }
        th { background-color: #f8f9fa; }
        .copy-btn { background: var(--success-color); margin-top: 15px; }
    </style>
</head>
<body>

<div class="card">
    <h2>📊 이미지 표 변환기 (v1.0)</h2>
    <p style="font-size: 0.9rem; color: #666;">식단표, 시설 관리 대장 등의 이미지를 HTML 표로 자동 변환합니다.</p>
    <input type="file" id="imageInput" accept="image/*">
    <button id="convertBtn" onclick="convertTable()">AI 분석 시작</button>
    <div id="loader" class="loading">⌛ AI가 표 구조를 분석하고 있습니다. 잠시만 기다려주세요...</div>
</div>

<div id="outputArea" class="card" style="display: none;">
    <h3>✅ 변환 결과</h3>
    <div id="tableContainer"></div>
    <button class="copy-btn" onclick="copyTableText()">텍스트로 복사하기</button>
</div>

<script type="module">
    import { GoogleGenerativeAI } from "https://esm.run/@google/generative-ai";

    // 💡 중요: 새로 발급받은 'AIza'로 시작하는 전체 API 키를 입력하세요.
    const API_KEY = "AIzaSyCu8Ha79r0opoS5iJ-HK3Xa-e5WmKd2Cjo"; 
    const genAI = new GoogleGenerativeAI(API_KEY);

    window.convertTable = async () => {
        const fileInput = document.getElementById('imageInput');
        const btn = document.getElementById('convertBtn');
        const loader = document.getElementById('loader');

        if (!fileInput.files[0]) return alert("이미지 파일을 선택해 주세요.");

        btn.disabled = true;
        loader.style.display = 'block';
        document.getElementById('outputArea').style.display = 'none';
        
        try {
            // Gemini 1.5 Flash 모델 호출
            const model = genAI.getGenerativeModel({ model: "gemini-1.5-flash" });
            
            const imagePart = await fileToGenerativePart(fileInput.files[0]);
            const prompt = "이 이미지 속의 표 데이터를 추출해서 HTML <table> 태그 형식으로 변환해줘. 스타일 속성은 제외하고 <thead>와 <tbody> 구조를 갖춘 순수 HTML만 응답해줘.";
            
            const result = await model.generateContent([prompt, imagePart]);
            const response = await result.response;
            const text = response.text();

            // 마크다운 형식 제거 및 HTML 삽입
            const cleanHtml = text.replace(/```html|```/g, "").trim();
            document.getElementById('tableContainer').innerHTML = cleanHtml;
            document.getElementById('outputArea').style.display = 'block';
            
        } catch (error) {
            console.error("Error Details:", error);
            alert("분석 중 오류가 발생했습니다.\n사유: " + error.message);
        } finally {
            btn.disabled = false;
            loader.style.display = 'none';
        }
    };

    // 파일 데이터를 AI 전송용 포맷으로 변환
    async function fileToGenerativePart(file) {
        const base64EncodedDataPromise = new Promise((resolve) => {
            const reader = new FileReader();
            reader.onloadend = () => resolve(reader.result.split(',')[1]);
            reader.readAsDataURL(file);
        });
        return {
            inlineData: { data: await base64EncodedDataPromise, mimeType: file.type },
        };
    }

    // 결과 텍스트 복사 (엑셀/메모장 붙여넣기용)
    window.copyTableText = () => {
        const tableData = document.getElementById('tableContainer').innerText;
        navigator.clipboard.writeText(tableData).then(() => {
            alert("표 내용이 복사되었습니다. 엑셀이나 메모장에 붙여넣으세요.");
        });
    };
</script>

</body>
</html>
