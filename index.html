<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>식단표 분석기 v2.4 (최종)</title>
    <style>
        body { font-family: -apple-system, sans-serif; padding: 20px; background: #f4f7f6; }
        .card { background: white; padding: 30px; border-radius: 15px; box-shadow: 0 4px 20px rgba(0,0,0,0.1); max-width: 700px; margin: auto; }
        h2 { text-align: center; color: #333; }
        button { width: 100%; padding: 15px; background: #28a745; color: white; border: none; border-radius: 8px; cursor: pointer; font-size: 16px; font-weight: bold; }
        button:disabled { background: #ccc; }
        #status { margin-top: 15px; text-align: center; font-weight: bold; }
        #result { margin-top: 25px; border-top: 2px solid #eee; padding-top: 20px; }
        table { width: 100%; border-collapse: collapse; }
        th, td { border: 1px solid #ddd; padding: 12px; text-align: left; }
    </style>
</head>
<body>

<div class="card">
    <h2>📋 식단표 자동 분석기 (v2.4)</h2>
    <input type="file" id="imageInput" accept="image/*" style="margin: 20px 0; width: 100%;">
    <button id="convertBtn" onclick="runAnalysis()">AI 분석 시작</button>
    <div id="status"></div>
    <div id="result"></div>
</div>

<script>
    async function runAnalysis() {
        const fileInput = document.getElementById('imageInput');
        const status = document.getElementById('status');
        const resultDiv = document.getElementById('result');
        const btn = document.getElementById('convertBtn');

        if (!fileInput.files[0]) return alert("이미지 파일을 선택하세요.");

        // 💡 [중요] image_bfc145.png에서 확인한 API 키를 아래에 넣으세요.
        const API_KEY = "AIzaSyCg9N3AmgRkibUtuT-PCq6ucUJexVZ67e4";

        // 구글 서버가 인식할 수 있는 모든 경로 조합입니다.
        const endpoints = [
            `https://generativelanguage.googleapis.com/v1beta/models/gemini-1.5-flash:generateContent?key=${API_KEY}`,
            `https://generativelanguage.googleapis.com/v1/models/gemini-1.5-flash:generateContent?key=${API_KEY}`,
            `https://generativelanguage.googleapis.com/v1beta/models/gemini-1.5-flash-latest:generateContent?key=${API_KEY}`
        ];

        btn.disabled = true;
        status.style.color = "blue";
        status.innerText = "⏳ AI가 경로를 찾아 분석 중입니다...";
        resultDiv.innerHTML = "";

        try {
            const file = fileInput.files[0];
            const base64Data = await new Promise((resolve) => {
                const reader = new FileReader();
                reader.onload = () => resolve(reader.result.split(',')[1]);
                reader.readAsDataURL(file);
            });

            const payload = {
                contents: [{
                    parts: [
                        { text: "이 이미지의 식단표를 분석해서 HTML <table> 태그로만 응답해줘. 중식, 석식, 야식 위주로 정리해." },
                        { inlineData: { mimeType: file.type, data: base64Data } }
                    ]
                }]
            };

            let success = false;
            for (let url of endpoints) {
                try {
                    const response = await fetch(url, {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify(payload)
                    });

                    const data = await response.json();

                    if (response.ok && data.candidates) {
                        const aiText = data.candidates[0].content.parts[0].text;
                        resultDiv.innerHTML = aiText.replace(/```html|```/g, "").trim();
                        status.style.color = "green";
                        status.innerText = "✅ 성공적으로 분석되었습니다!";
                        success = true;
                        break; 
                    } else {
                        console.warn(`경로 시도 실패 (${url}):`, data.error?.message);
                    }
                } catch (e) { console.error("통신 장애:", e); }
            }

            if (!success) throw new Error("구글 서버에서 모델을 찾을 수 없습니다. API 활성화 여부를 확인하세요.");

        } catch (error) {
            status.style.color = "red";
            status.innerText = "❌ 실패: " + error.message;
        } finally {
            btn.disabled = false;
        }
    }
</script>
</body>
</html>
