<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <title>이미지 표 분석 v2.1</title>
    <style>
        body { font-family: sans-serif; padding: 20px; background: #f4f7f6; }
        .card { background: white; padding: 25px; border-radius: 15px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); max-width: 600px; margin: auto; }
        button { width: 100%; padding: 15px; background: #4A90E2; color: white; border: none; border-radius: 8px; cursor: pointer; font-weight: bold; }
        #status { margin-top: 15px; text-align: center; }
    </style>
</head>
<body>
<div class="card">
    <h2>📋 식단표 자동 분석기</h2>
    <input type="file" id="imageInput" accept="image/*" style="margin: 20px 0; width: 100%;">
    <button onclick="runAnalysis()">AI 분석 시작</button>
    <div id="status"></div>
    <div id="result" style="margin-top:20px;"></div>
</div>

<script>
async function runAnalysis() {
    const file = document.getElementById('imageInput').files[0];
    const status = document.getElementById('status');
    const resultDiv = document.getElementById('result');
    
    if (!file) return alert("이미지를 선택하세요!");

    // 💡 여기에 방금 만드신 새 API 키를 넣으세요!
    const API_KEY = "AIzaSyBlMQlI0de8dKBUoxYKaSKtZpNi3kbbEMs"; 
    
    // 가장 안정적인 v1 경로를 사용합니다.
    const API_URL = `https://generativelanguage.googleapis.com/v1/models/gemini-1.5-flash:generateContent?key=${API_KEY}`;

    status.innerText = "⏳ AI가 식단표를 읽고 있습니다...";
    
    try {
        const base64Data = await new Promise(r => {
            const reader = new FileReader();
            reader.onload = () => r(reader.result.split(',')[1]);
            reader.readAsDataURL(file);
        });

        const response = await fetch(API_URL, {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({
                contents: [{
                    parts: [
                        { text: "이 이미지 속의 식단표를 HTML <table> 코드로만 추출해줘." },
                        { inlineData: { mimeType: file.type, data: base64Data } }
                    ]
                }]
            })
        });

        const data = await response.json();
        if (data.candidates) {
            const html = data.candidates[0].content.parts[0].text.replace(/```html|```/g, "");
            resultDiv.innerHTML = html;
            status.innerText = "✅ 분석 완료!";
        } else {
            throw new Error(data.error.message);
        }
    } catch (e) {
        status.innerText = "❌ 에러 발생: " + e.message;
        console.error(e);
    }
}
</script>
</body>
</html>
