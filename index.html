<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <title>식단표 분석기 v3.0</title>
    <style>
        body { font-family: sans-serif; padding: 20px; background: #f0f2f5; }
        .container { background: white; padding: 30px; border-radius: 12px; box-shadow: 0 4px 10px rgba(0,0,0,0.1); max-width: 600px; margin: auto; }
        h2 { text-align: center; color: #1a73e8; }
        button { width: 100%; padding: 15px; background: #1a73e8; color: white; border: none; border-radius: 6px; cursor: pointer; font-size: 16px; margin-top: 10px; }
        #status { margin-top: 15px; text-align: center; font-weight: bold; color: #555; }
        #result { margin-top: 20px; line-height: 1.6; }
        table { width: 100%; border-collapse: collapse; margin-top: 10px; }
        th, td { border: 1px solid #ddd; padding: 10px; text-align: left; }
    </style>
</head>
<body>
<div class="container">
    <h2>식단표 AI 분석기</h2>
    <input type="file" id="menuImage" accept="image/*" style="margin: 20px 0; width: 100%;">
    <button onclick="analyze()">분석 시작</button>
    <div id="status"></div>
    <div id="result"></div>
</div>

<script>
async function analyze() {
    const file = document.getElementById('menuImage').files[0];
    if (!file) return alert("식단표 사진을 선택해주세요.");

    // 💡 AI Studio에서 발급받은 키를 여기에 넣으세요!
    const API_KEY = "AIzaSyCurSVHt6L9qgqQg6Ps1VubbuK2uAaeJtg"; 
    const url = `https://generativelanguage.googleapis.com/v1beta/models/gemini-1.5-flash:generateContent?key=${API_KEY}`;

    const status = document.getElementById('status');
    status.innerText = "⏳ 분석 중... 잠시만 기다려주세요.";

    try {
        const base64 = await new Promise(resolve => {
            const reader = new FileReader();
            reader.onload = () => resolve(reader.result.split(',')[1]);
            reader.readAsDataURL(file);
        });

        const response = await fetch(url, {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({
                contents: [{ parts: [
                    { text: "이 식단표 이미지에서 중식, 석식, 야식 메뉴를 HTML 테이블로 정리해줘." },
                    { inlineData: { mimeType: file.type, data: base64 } }
                ]}]
            })
        });

        const data = await response.json();
        if (data.candidates) {
            document.getElementById('result').innerHTML = data.candidates[0].content.parts[0].text.replace(/```html|```/g, "");
            status.innerText = "✅ 분석 완료!";
        } else {
            status.innerText = "❌ 키가 올바르지 않거나 설정이 필요합니다.";
        }
    } catch (e) {
        status.innerText = "❌ 오류 발생: " + e.message;
    }
}
</script>
</body>
</html>
