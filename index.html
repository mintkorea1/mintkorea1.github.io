<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>이미지 표 분석 변환기</title>
    <style>
        :root { --primary-color: #4A90E2; }
        body { font-family: -apple-system, sans-serif; padding: 20px; background: #f0f2f5; color: #333; }
        .card { background: white; padding: 24px; border-radius: 16px; box-shadow: 0 4px 6px rgba(0,0,0,0.05); max-width: 900px; margin: 0 auto 20px; }
        button { background: var(--primary-color); color: white; border: none; padding: 12px 24px; border-radius: 8px; cursor: pointer; font-weight: bold; }
        button:disabled { background: #ccc; }
        table { width: 100%; border-collapse: collapse; margin-top: 20px; border: 1px solid #ddd; }
        th, td { border: 1px solid #ddd; padding: 10px; text-align: left; }
        th { background-color: #f8f9fa; }
    </style>
</head>
<body>

<div class="card">
    <h2>📊 이미지 표 변환기 (v1.1)</h2>
    <input type="file" id="imageInput" accept="image/*">
    <button id="convertBtn" onclick="convertTable()">AI 분석 시작</button>
    <div id="loader" style="display:none; margin-top:15px;">⌛ AI가 분석 중입니다...</div>
</div>

<div id="outputArea" class="card" style="display: none;">
    <h3>✅ 변환 결과</h3>
    <div id="tableContainer"></div>
</div>

<script type="module">
    // 1. 최신 안정화 버전의 라이브러리를 사용합니다.
    import { GoogleGenerativeAI } from "https://esm.run/@google/generative-ai";

    // 2. 사용자님의 API 키를 입력하세요.
    const API_KEY = "AIzaSyAcBHuBS3HPqJ_T-DKRAzya0J-WcgazsXE"; 
    const genAI = new GoogleGenerativeAI(API_KEY);

    window.convertTable = async () => {
        const fileInput = document.getElementById('imageInput');
        const btn = document.getElementById('convertBtn');
        const loader = document.getElementById('loader');

        if (!fileInput.files[0]) return alert("파일을 선택해 주세요.");

        btn.disabled = true;
        loader.style.display = 'block';
        
        try {
            // 3. 모델 명칭을 가장 안전한 'gemini-1.5-flash'로 명시합니다.
            const model = genAI.getGenerativeModel({ model: "gemini-1.5-flash" });
            
            const imagePart = await fileToGenerativePart(fileInput.files[0]);
            const prompt = "이미지의 표를 HTML <table> 구조로 변환해줘. <thead>와 <tbody>를 포함해줘.";
            
            const result = await model.generateContent([prompt, imagePart]);
            const text = result.response.text();

            // 마크다운 기호(```html) 제거
            const cleanHtml = text.replace(/```html|```/g, "").trim();
            document.getElementById('tableContainer').innerHTML = cleanHtml;
            document.getElementById('outputArea').style.display = 'block';
            
        } catch (error) {
            console.error(error);
            // 에러 발생 시 상세 내용을 띄워 확인합니다.
            alert("에러 발생: " + error.message);
        } finally {
            btn.disabled = false;
            loader.style.display = 'none';
        }
    };

    async function fileToGenerativePart(file) {
        const base64EncodedDataPromise = new Promise((resolve) => {
            const reader = new FileReader();
            reader.onloadend = () => resolve(reader.result.split(',')[1]);
            reader.readAsDataURL(file);
        });
        return {
            inlineData: { data: await base64EncodedDataPromise, mimeType: file.type },
        };
    }
</script>

</body>
</html>
