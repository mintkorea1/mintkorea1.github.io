<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>이미지 표 분석 v1.7</title>
    <style>
        :root { --primary: #4A90E2; --bg: #f4f7f6; }
        body { font-family: -apple-system, sans-serif; padding: 20px; background: var(--bg); color: #333; }
        .card { background: white; padding: 24px; border-radius: 16px; box-shadow: 0 4px 20px rgba(0,0,0,0.08); max-width: 800px; margin: 0 auto; }
        button { background: var(--primary); color: white; border: none; padding: 14px; border-radius: 8px; cursor: pointer; width: 100%; font-weight: bold; }
        button:disabled { background: #ccc; }
        #tableContainer { width: 100%; overflow-x: auto; margin-top: 25px; }
        table { width: 100%; border-collapse: collapse; }
        th, td { border: 1px solid #ddd; padding: 12px; text-align: left; }
    </style>
</head>
<body>

<div class="card">
    <h2>📊 이미지 표 분석 변환기 (v1.7)</h2>
    <input type="file" id="imageInput" accept="image/*" style="margin:20px 0; width:100%;">
    <button id="convertBtn" onclick="runAnalysis()">AI 분석 시작</button>
    <div id="status" style="margin-top:15px; text-align:center;"></div>
    <div id="tableContainer"></div>
</div>

<script type="module">
    // 💡 라이브러리 버전을 0.12.0으로 강제 고정하여 v1beta 에러를 원천 차단합니다.
    import { GoogleGenerativeAI } from "https://esm.run/@google/generative-ai@0.12.0";

    const API_KEY = "AIzaSyCq2FeS2HfHFOSsHCmXPAzkDmLebb_ZOO0"; 
    const genAI = new GoogleGenerativeAI(API_KEY);

    window.runAnalysis = async () => {
        const fileInput = document.getElementById('imageInput');
        const status = document.getElementById('status');
        const btn = document.getElementById('convertBtn');
        const container = document.getElementById('tableContainer');

        if (!fileInput.files[0]) return alert("이미지 파일을 선택하세요.");

        btn.disabled = true;
        status.innerHTML = "⌛ 분석 중...";
        container.innerHTML = "";

        try {
            // [중요] 최신 버전에서는 이 한 줄이면 충분합니다.
            const model = genAI.getGenerativeModel({ model: "gemini-1.5-flash" });

            const file = fileInput.files[0];
            const base64Data = await new Promise((resolve) => {
                const reader = new FileReader();
                reader.onload = () => resolve(reader.result.split(',')[1]);
                reader.readAsDataURL(file);
            });

            const result = await model.generateContent([
                "이미지의 데이터를 HTML <table> 구조로 응답해줘. 설명 없이 코드만.",
                { inlineData: { data: base64Data, mimeType: file.type } }
            ]);

            const text = result.response.text();
            container.innerHTML = text.replace(/```html|```/g, "").trim();
            status.innerHTML = "✅ 완료!";
            
        } catch (error) {
            console.error("Error Detail:", error);
            // 에러 메시지에 주소가 포함되어 나오면 v1beta인지 v1인지 꼭 확인해보세요.
            alert("에러 발생: " + error.message);
            status.innerHTML = "❌ 오류 발생";
        } finally {
            btn.disabled = false;
        }
    };
</script>

</body>
</html>
