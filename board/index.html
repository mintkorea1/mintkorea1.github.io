<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>식단표 AI 분석기 v3.4</title>
    <style>
        body { font-family: sans-serif; padding: 20px; background: #f8f9fa; }
        .container { background: white; padding: 30px; border-radius: 15px; box-shadow: 0 4px 10px rgba(0,0,0,0.1); max-width: 500px; margin: auto; }
        button { width: 100%; padding: 15px; background: #1a73e8; color: white; border: none; border-radius: 8px; cursor: pointer; font-weight: bold; }
        #status { margin-top: 15px; text-align: center; }
        #result { margin-top: 20px; border-top: 1px solid #eee; padding-top: 20px; }
        table { width: 100%; border-collapse: collapse; }
        th, td { border: 1px solid #ddd; padding: 8px; text-align: left; }
    </style>
</head>
<body>

<div class="container">
    <h2>🍴 식단표 AI 분석기</h2>
    <input type="file" id="menuImage" accept="image/*" style="margin-bottom: 20px; width: 100%;">
    <button onclick="analyzeMenu()">AI 분석 시작</button>
    <div id="status"></div>
    <div id="result"></div>
</div>

<script>
async function analyzeMenu() {
    const fileInput = document.getElementById('menuImage');
    const status = document.getElementById('status');
    const resultDiv = document.getElementById('result');
    
    if (!fileInput.files[0]) {
        alert("사진을 먼저 선택해주세요!");
        return;
    }

    // [중요] 여기에 태언님의 API 키를 넣어주세요.
    const API_KEY = "AQ.Ab8RN6KUoip6fdnIq4o-lUQBYHZt5irx0CTVgWUSAGn8F603sA"; 
const url = `https://generativelanguage.googleapis.com/v1/models/gemini-1.5-flash:generateContent?key=${API_KEY}`;
    status.innerHTML = "⏳ 분석 중...";
    resultDiv.innerHTML = "";

    try {
        const file = fileInput.files[0];
        const base64Data = await new Promise((resolve) => {
            const reader = new FileReader();
            reader.onload = () => resolve(reader.result.split(',')[1]);
            reader.readAsDataURL(file);
        });

        const response = await fetch(url, {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({
                contents: [{
                    parts: [
                        { text: "이 이미지의 식단표를 HTML 테이블로 요약해줘." },
                        { inlineData: { mimeType: file.type, data: base64Data } }
                    ]
                }]
            })
        });

        const data = await response.json();
        if (data.candidates) {
            let text = data.candidates[0].content.parts[0].text;
            // 에러가 났던 replace 부분을 아주 안전하게 바꿨습니다.
            text = text.split('```html').join('').split('```').join('');
            resultDiv.innerHTML = text;
            status.innerHTML = "✅ 완료!";
        }
    } catch (e) {
        status.innerHTML = "🚨 에러: " + e.message;
    }
}
</script>
</body>
</html>
