<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>식단표 AI 분석기 v3.7</title>
    <style>
        body { font-family: 'Pretendard', sans-serif; padding: 20px; background: #f8f9fa; color: #333; }
        .container { background: white; padding: 30px; border-radius: 15px; box-shadow: 0 4px 20px rgba(0,0,0,0.08); max-width: 600px; margin: auto; }
        h2 { text-align: center; color: #1a73e8; margin-bottom: 25px; }
        .upload-section { border: 2px dashed #dee2e6; padding: 20px; text-align: center; border-radius: 10px; margin-bottom: 20px; }
        button { width: 100%; padding: 15px; background: #1a73e8; color: white; border: none; border-radius: 8px; cursor: pointer; font-size: 16px; font-weight: bold; }
        #status { margin-top: 15px; text-align: center; font-weight: 500; }
        #result { margin-top: 25px; border-top: 2px solid #f1f3f4; padding-top: 20px; }
        table { width: 100%; border-collapse: collapse; margin-top: 10px; }
        th, td { border: 1px solid #dee2e6; padding: 12px; text-align: left; }
    </style>
</head>
<body>

<div class="container">
    <h2>🍴 식단표 AI 분석기</h2>
    <div class="upload-section">
        <input type="file" id="menuImage" accept="image/*" style="width: 100%;">
    </div>
    <button onclick="analyzeMenu()">AI 분석 시작</button>
    <div id="status"></div>
    <div id="result"></div>
</div>

<script>
async function analyzeMenu() {
    const fileInput = document.getElementById('menuImage');
    const status = document.getElementById('status');
    const resultDiv = document.getElementById('result');
    
    if (!fileInput.files[0]) {
        alert("사진을 선택해주세요!");
        return;
    }

    // 💡 [필독] image_97c7a4.png에서 생성한 API 키를 아래에 넣어주세요.
    const API_KEY = "AQ.Ab8RN6KUoip6fdnIq4o-lUQBYHZt5irx0CTVgWUSAGn8F603sA"; 
    
    // 🛠️ 404 에러를 잡기 위해 주소 체계를 '모델 포함형' v1beta로 재설정했습니다.
const url = `https://generativelanguage.googleapis.com/v1/models/gemini-1.5-flash:generateContent?key=${API_KEY}`;
    status.innerHTML = "⏳ AI가 사진을 읽고 있습니다...";
    resultDiv.innerHTML = "";

    try {
        const file = fileInput.files[0];
        const base64Data = await new Promise((resolve) => {
            const reader = new FileReader();
            reader.onload = () => resolve(reader.result.split(',')[1]);
            reader.readAsDataURL(file);
        });

        const response = await fetch(url, {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({
                contents: [{
                    parts: [
                        { text: "이 식단표 이미지의 메뉴를 날짜별로 구분해서 HTML 표(table)로 만들어줘. 설명은 빼고 표만 보여줘." },
                        { inlineData: { mimeType: file.type, data: base64Data } }
                    ]
                }]
            })
        });

        const data = await response.json();
        
        // 🚨 404 에러가 또 발생한다면 콘솔에 찍힌 상세 내용을 확인하기 위한 코드입니다.
        if (!response.ok) {
            console.error("서버 응답 에러:", data);
            throw new Error(data.error?.message || "서버 연결 실패");
        }

        if (data.candidates && data.candidates[0].content.parts[0].text) {
            let aiText = data.candidates[0].content.parts[0].text;
            aiText = aiText.replace(/```html|```/g, "").trim();
            resultDiv.innerHTML = aiText;
            status.innerHTML = "✅ 분석 완료!";
        }
    } catch (error) {
        status.innerHTML = "🚨 오류 발생: " + error.message;
    }
}
</script>
</body>
</html>
