<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>식단표 AI 분석기 v3.5</title>
    <style>
        body { font-family: 'Pretendard', sans-serif; padding: 20px; background: #f8f9fa; color: #333; }
        .container { background: white; padding: 30px; border-radius: 15px; box-shadow: 0 4px 20px rgba(0,0,0,0.08); max-width: 600px; margin: auto; }
        h2 { text-align: center; color: #1a73e8; margin-bottom: 25px; }
        .upload-section { border: 2px dashed #dee2e6; padding: 20px; text-align: center; border-radius: 10px; margin-bottom: 20px; }
        button { width: 100%; padding: 15px; background: #1a73e8; color: white; border: none; border-radius: 8px; cursor: pointer; font-size: 16px; font-weight: bold; }
        button:hover { background: #1557b0; }
        #status { margin-top: 15px; text-align: center; font-weight: 500; }
        #result { margin-top: 25px; border-top: 2px solid #f1f3f4; padding-top: 20px; }
        table { width: 100%; border-collapse: collapse; margin-top: 10px; background: white; }
        th, td { border: 1px solid #dee2e6; padding: 12px; text-align: left; font-size: 14px; }
        th { background-color: #f8f9fa; color: #1a73e8; }
        .error-box { color: #d93025; background: #fce8e6; padding: 10px; border-radius: 5px; font-size: 13px; margin-top: 10px; }
    </style>
</head>
<body>

<div class="container">
    <h2>🍴 식단표 AI 분석기</h2>
    <div class="upload-section">
        <input type="file" id="menuImage" accept="image/*" style="width: 100%;">
        <p style="font-size: 12px; color: #666; margin-top: 10px;">식단표 사진을 선택해주세요.</p>
    </div>
    <button onclick="analyzeMenu()">AI 분석 시작</button>
    <div id="status"></div>
    <div id="result"></div>
</div>

<script>
async function analyzeMenu() {
    const fileInput = document.getElementById('menuImage');
    const status = document.getElementById('status');
    const resultDiv = document.getElementById('result');
    
    if (!fileInput.files[0]) {
        alert("사진을 먼저 선택해주세요!");
        return;
    }

    // 💡 [중요] image_97c7a4.png에서 확인한 API 키를 아래 따옴표 안에 꼭 넣어주세요.
    const API_KEY = "AQ.Ab8RN6KUoip6fdnIq4o-lUQBYHZt5irx0CTVgWUSAGn8F603sA"; 
    
    // CORS 에러와 404 에러를 방지하기 위해 주소를 가장 안전한 방식으로 결합했습니다.
// 기존 url 줄을 지우고 이 줄로 바꿔주세요.
const url = "[https://generativelanguage.googleapis.com/v1/gemini-1.5-flash:generateContent?key=](https://generativelanguage.googleapis.com/v1/gemini-1.5-flash:generateContent?key=)" + API_KEY;
    status.innerHTML = "⏳ AI가 분석을 시작합니다. 잠시만 기다려주세요...";
    resultDiv.innerHTML = "";

    try {
        const file = fileInput.files[0];
        const base64Data = await new Promise((resolve) => {
            const reader = new FileReader();
            reader.onload = () => resolve(reader.result.split(',')[1]);
            reader.readAsDataURL(file);
        });

        const response = await fetch(url, {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({
                contents: [{
                    parts: [
                        { text: "이 식단표 이미지에서 날짜별 중식, 석식, 야식 메뉴를 찾아내서 HTML table 구조로 정리해줘. 다른 설명은 하지마." },
                        { inlineData: { mimeType: file.type, data: base64Data } }
                    ]
                }]
            })
        });

        const data = await response.json();

        if (!response.ok) {
            throw new Error(data.error?.message || "연결 실패 (API 키나 주소를 확인하세요)");
        }

        if (data.candidates && data.candidates[0].content.parts[0].text) {
            let aiText = data.candidates[0].content.parts[0].text;
            // 마크다운 형식 제거
            aiText = aiText.split('```html').join('').split('```').join('').trim();
            
            resultDiv.innerHTML = aiText;
            status.innerHTML = "<span style='color:#28a745'>✅ 분석이 완료되었습니다!</span>";
        } else {
            status.innerHTML = "❌ 분석 결과를 찾을 수 없습니다.";
        }

    } catch (error) {
        console.error("에러 상세:", error);
        status.innerHTML = "<div class='error-box'>🚨 에러 발생: " + error.message + "</div>";
    }
}
</script>

</body>
</html>
